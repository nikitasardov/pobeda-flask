[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: [TYPE] юнит-тесты (проверка отдельных функций/модулей в изоляции)
    api: [TYPE] интеграционные API-тесты (проверка HTTP-эндпоинтов через TestClient)
    users: [AREA/PURPOSE] тесты домена users (может сочетаться с unit и api)
    db: [AREA/PURPOSE] тесты слоя данных/моделей и работы с БД (может сочетаться с unit и api)
    smoke: [AREA/PURPOSE] быстрые проверки критичного функционала (короткий прогон)