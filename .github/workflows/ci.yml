name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: docker compose run --rm test 2>&1 | tee test-output.txt

      - name: Extract coverage
        if: github.event_name == 'push' && success()
        id: coverage
        run: |
          COVERAGE=$(grep '^TOTAL' test-output.txt | awk '{print $NF}' | tr -d '%')
          echo "total=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.event_name == 'push' && success()
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          COVERAGE_TOTAL: ${{ steps.coverage.outputs.total }}
        run: |
          COLOR="red"
          if [ "$COVERAGE_TOTAL" -ge 90 ]; then COLOR="brightgreen"; elif [ "$COVERAGE_TOTAL" -ge 75 ]; then COLOR="yellow"; elif [ "$COVERAGE_TOTAL" -ge 50 ]; then COLOR="orange"; fi
          export COLOR
          python -c "import json, os; content={'schemaVersion': 1, 'label': 'coverage', 'message': f\"{os.environ['COVERAGE_TOTAL']}%\", 'color': os.environ['COLOR']}; payload={'files': {'coverage.json': {'content': json.dumps(content, ensure_ascii=False)}}}; print(json.dumps(payload))" > payload.json
          curl -sS -X PATCH \
            -H "Authorization: token ${GIST_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/gists/${GIST_ID} \
            --data @payload.json > /dev/null

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run linters
        run: docker compose run --rm lint

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Build API image
        run: docker compose build api

      - name: Save image
        run: docker save pobeda-flask-api:latest | gzip > pobeda-flask-api.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy image to server
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} \
            pobeda-flask-api.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             git pull origin master && \
             docker load -i pobeda-flask-api.tar.gz && \
             docker compose up -d && \
             docker compose restart frontend && \
             rm pobeda-flask-api.tar.gz"
